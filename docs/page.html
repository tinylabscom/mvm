<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mvm docs</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --code-bg: #161b22;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Nav bar */
    nav {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    nav .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    nav .logo {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    nav .links {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
    }

    nav .links a { color: var(--text-muted); }
    nav .links a:hover { color: var(--accent); text-decoration: none; }

    /* Markdown content */
    .content {
      padding-bottom: 80px;
    }

    .content h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .content h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
    }

    .content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 8px;
    }

    .content p {
      margin-bottom: 16px;
    }

    .content ul, .content ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }

    .content li {
      margin-bottom: 6px;
    }

    .content code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
      overflow-x: auto;
      line-height: 1.5;
    }

    .content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      color: var(--text);
    }

    /* Override Prism theme background to match our surface color */
    .content pre[class*="language-"],
    .content code[class*="language-"] {
      background: var(--surface);
      text-shadow: none;
    }

    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin-bottom: 16px;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 0 8px 8px 0;
    }

    .content blockquote p {
      margin-bottom: 0;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .content th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      background: var(--surface);
    }

    .content td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .content td code {
      white-space: nowrap;
      color: var(--accent);
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .content strong { color: var(--text); }

    .content img {
      max-width: 100%;
      border-radius: 8px;
    }

    /* Loading / error states */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .error {
      text-align: center;
      padding: 80px 0;
      color: var(--red);
    }

    /* Footer */
    footer {
      padding: 40px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <nav>
    <div class="inner">
      <a class="logo" href="./">mvm</a>
      <div class="links">
        <a href="./">Home</a>
        <a href="page.html?doc=quickstart.md">Quick Start</a>
        <a href="page.html?doc=user-guide.md">User Guide</a>
        <a href="page.html?doc=development.md">Development</a>
        <a href="page.html?doc=troubleshooting.md">Troubleshooting</a>
        <a href="https://github.com/auser/mvm">GitHub</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="content" class="content">
      <div class="loading">Loading documentation...</div>
    </div>

    <footer>
      <a href="https://github.com/auser/mvm">GitHub</a> &middot;
      <a href="https://github.com/auser/mvm/releases">Releases</a> &middot;
      Apache 2.0
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-nix.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script>
    (function () {
      var contentEl = document.getElementById('content');
      var params = new URLSearchParams(window.location.search);
      var doc = params.get('doc');

      function showError(msg) {
        contentEl.textContent = '';
        var div = document.createElement('div');
        div.className = 'error';
        div.textContent = msg;
        var link = document.createElement('a');
        link.href = './';
        link.textContent = ' Go home';
        div.appendChild(link);
        contentEl.appendChild(div);
      }

      // Validate: only allow simple filenames like "quickstart.md" or "adr/001-foo.md"
      if (!doc || !/^[\w][\w./-]*\.md$/.test(doc) || doc.indexOf('..') !== -1) {
        showError('No document specified.');
        return;
      }

      // Update page title
      var name = doc.replace('.md', '').replace(/^.*\//, '').replace(/-/g, ' ');
      document.title = name.charAt(0).toUpperCase() + name.slice(1) + ' — mvm docs';

      fetch(doc)
        .then(function (res) {
          if (!res.ok) throw new Error('Not found');
          return res.text();
        })
        .then(function (md) {
          // Rewrite relative .md links to use page.html?doc=
          md = md.replace(/\[([^\]]+)\]\((?!https?:\/\/)([^)]+\.md)\)/g,
            '[$1](page.html?doc=$2)');

          var rawHtml = marked.parse(md);
          var cleanHtml = DOMPurify.sanitize(rawHtml, {
            ADD_ATTR: ['class']
          });
          contentEl.textContent = '';
          var wrapper = document.createElement('div');
          wrapper.innerHTML = cleanHtml;
          contentEl.appendChild(wrapper);

          // Run Prism on all code blocks
          Prism.highlightAllUnder(wrapper);
        })
        .catch(function () {
          showError('Could not load "' + doc + '".');
        });
    })();
  </script>

</body>
</html>
