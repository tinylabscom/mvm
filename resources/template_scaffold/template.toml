# Template build config generated by mvm template init
template_id = "{{name}}"
flake_ref   = "."
profile     = "gateway" # default fallback; variants can override

[[variants]]
name = "{{name}}-gateway"
role = "gateway"
profile = "gateway"
vcpus = 2
mem_mib = 1024
data_disk_mib = 0

[[variants]]
name = "{{name}}-worker"
role = "worker"
profile = "worker"
vcpus = 2
mem_mib = 2048
data_disk_mib = 2048
