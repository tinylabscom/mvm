# cargo-deny configuration — ADR-002 §W5.2.
#
# Three policies enforced against the workspace's transitive Cargo
# graph on every PR:
#
#   1. RustSec advisories block merge.
#   2. License is in a vetted allowlist.
#   3. The `bans` section catches duplicate-major-version drift,
#      which both bloats the binary and makes auditing harder.
#
# False positives — typically a transitive dep whose advisory we've
# read and accepted — are addressed in this file via a per-entry
# `ignore` or `skip`. Don't suppress globally.

[graph]
all-features = false
no-default-features = false
exclude-dev = false

[output]
feature-depth = 1

# ── Advisories ────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Each ignore is a deliberate, audited acceptance of a transitive
# unmaintained-or-similar advisory we cannot fix without ripping out
# a load-bearing dep. Re-evaluate at each Cargo.lock major bump.
ignore = [
    # `fxhash` is unmaintained but pinned as a transitive dep via
    # `notify` / file-watching infrastructure. Replacement (rustc-hash
    # or ahash) requires upstream changes. Audited 2026-04-30: the
    # crate is ~200 LoC and contains no networking, no IO, no unsafe
    # beyond basic pointer arithmetic.
    { id = "RUSTSEC-2025-0057", reason = "transitive via notify; ~200 LoC, no IO, audited 2026-04-30" },
    # `instant` is the wasm-time abstraction. Pulled in transitively
    # via a parking_lot 0.11 chain. Replaced upstream by `web-time` in
    # newer parking_lot. Track via a Cargo.lock bump.
    { id = "RUSTSEC-2024-0384", reason = "transitive via old parking_lot chain; will resolve on upstream bump" },
    # `number_prefix` is a pure-functional formatter used by indicatif.
    # Unmaintained but functionally complete; no security surface.
    { id = "RUSTSEC-2025-0119", reason = "transitive via indicatif; pure formatter, no IO, audited 2026-04-30" },
]

# ── Licenses ──────────────────────────────────────────────────────
[licenses]
# Confidence threshold for SPDX detection. 0.8 is the cargo-deny
# default; bumping it past 0.9 starts to flag legitimate licenses
# that ship with slightly non-standard headers.
confidence-threshold = 0.8

# Allowlist mirrors the licenses present in the current dep tree
# (verified by an initial `cargo deny check licenses --hide-inclusion-graph`
# pass). New deps with licenses outside this list need explicit
# review and an addition here — the discipline is the point.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "0BSD",
]

# Per-crate exception for crates whose license cannot be detected
# from the repo (no LICENSE file, custom header). Each entry is a
# deliberate decision, not a blanket pass.
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Bans ──────────────────────────────────────────────────────────
[bans]
# Multiple major versions of the same crate inflate the binary,
# fragment audit attention, and frequently mask transitive
# duplication of cryptographic primitives. We deny by default and
# add a `skip` only with a reason.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# A "skip" allows multiple versions of a single crate; a "skip-tree"
# allows them under a specific subtree. Use sparingly; each entry
# is a place auditors must reason about by hand.
skip = []
skip-tree = []

deny = []

# ── Sources ───────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
