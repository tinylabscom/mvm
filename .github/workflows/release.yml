name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set linker for aarch64-unknown-linux-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
          # Use vendored OpenSSL for cross-compilation to avoid linking issues
          OPENSSL_STATIC: 1
          OPENSSL_VENDORED: 1
        run: cargo build --release --target "${TARGET}"

      - name: Smoke test binary (native targets only)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          BIN="target/${TARGET}/release/mvmctl"
          "$BIN" --version
          "$BIN" --help > /dev/null
          "$BIN" metrics --json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'requests_total' in d, 'metrics JSON missing requests_total'
          print('smoke test passed')
          "

      - name: Package binary and generate checksums
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          BIN_NAME="mvmctl"
          ARCHIVE_NAME="mvmctl-${TARGET}"

          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/${BIN_NAME}" "staging/${ARCHIVE_NAME}/"
          cp -r resources "staging/${ARCHIVE_NAME}/" 2>/dev/null || true
          cp README.md "staging/${ARCHIVE_NAME}/" 2>/dev/null || true

          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

          # Generate SHA256 checksum for the tarball
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mvmctl-${{ matrix.target }}
          path: |
            staging/*.tar.gz
            staging/*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: cargo cyclonedx --format json --all --output-cdx sbom.cdx.json

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksum file
        shell: bash
        run: |
          cd artifacts
          # Combine per-platform checksums into one file
          cat *.sha256 > checksums-sha256.txt
          echo "Combined checksums:"
          cat checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/checksums-sha256.txt \
            sbom.cdx.json
